<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>라스트 휘슬 — Last Whistle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1A30; --navy2:#142540; --navy3:#1C3154;
  --paper:#F8F5EE; --paper2:#EFE9DC; --ink:#1B2A44;
  --gold:#C9A227; --gold2:#E8C95C; --goldd:#9A7B14;
  --green:#23694A; --greenline:rgba(255,255,255,.35);
  --red:#C0392B; --good:#2E8B57;
  --glass:rgba(255,255,255,.08); --glassb:rgba(255,255,255,.16);
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --r:18px;
  --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans); color:#EAF0FA; background:var(--navy);
  background-image:
    radial-gradient(1200px 700px at 75% -10%, #21406E 0%, transparent 60%),
    radial-gradient(900px 600px at -10% 110%, #112245 0%, transparent 55%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.012) 0 2px, transparent 2px 9px);
  min-height:100vh; overflow-x:hidden;
}
#app{max-width:980px;margin:0 auto;padding:18px 14px 80px;min-height:100vh;position:relative}
.fade{animation:fadeUp .45s cubic-bezier(.2,.7,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.45)}50%{box-shadow:0 0 0 10px rgba(201,162,39,0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ----- 상단 바 ----- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.brand{font-family:var(--serif);font-weight:900;font-size:18px;letter-spacing:.06em;color:var(--gold2)}
.brand small{display:block;font-family:var(--sans);font-weight:500;font-size:10px;letter-spacing:.4em;color:#8FA2C4}
.statchips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--glass);border:1px solid var(--glassb);backdrop-filter:blur(8px);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;display:flex;gap:6px;align-items:center}
.chip b{color:var(--gold2)}
.iconbtn{background:var(--glass);border:1px solid var(--glassb);color:#EAF0FA;border-radius:12px;padding:7px 11px;cursor:pointer;font-size:14px;backdrop-filter:blur(8px);transition:.2s}
.iconbtn:hover{border-color:var(--gold);color:var(--gold2)}

/* ----- 글래스 카드 ----- */
.glass{background:var(--glass);border:1px solid var(--glassb);backdrop-filter:blur(14px);border-radius:var(--r);box-shadow:var(--shadow)}
.panel{padding:22px}
.eyebrow{font-size:11px;letter-spacing:.35em;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
h1.display{font-family:var(--serif);font-weight:900;font-size:clamp(34px,7vw,58px);line-height:1.12;color:#fff}
h2.scene{font-family:var(--serif);font-weight:800;font-size:clamp(20px,4vw,28px);color:#fff;margin-bottom:10px}
.lead{color:#C5D2E8;line-height:1.75;font-size:15px}
.goldline{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:14px 0;border-radius:2px}

/* ----- 선택지 ----- */
.choices{display:grid;gap:10px;margin-top:18px}
.choice{
  text-align:left;background:rgba(255,255,255,.05);border:1px solid var(--glassb);
  color:#EAF0FA;border-radius:14px;padding:14px 16px;font-size:14.5px;font-weight:600;
  cursor:pointer;transition:transform .15s, border-color .2s, background .2s;font-family:var(--sans);
  display:flex;gap:12px;align-items:center;
}
.choice:hover{transform:translateX(4px);border-color:var(--gold);background:rgba(201,162,39,.1)}
.choice .key{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--gold);color:var(--navy);display:grid;place-items:center;font-weight:900;font-size:13px}
.choice small{display:block;font-weight:400;color:#9FB2D2;font-size:12px;margin-top:2px}
.btn{
  display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--goldd));
  color:#10182A;font-weight:900;border:none;border-radius:13px;padding:13px 24px;font-size:15px;cursor:pointer;
  font-family:var(--sans);transition:transform .15s, filter .2s;box-shadow:0 8px 24px rgba(201,162,39,.3);
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn.ghost{background:transparent;color:#EAF0FA;border:1px solid var(--glassb);box-shadow:none;font-weight:700}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ----- 책상(허브) ----- */
.desk{
  border-radius:24px;padding:26px 22px 30px;position:relative;overflow:hidden;
  background:
    radial-gradient(700px 280px at 50% -60px, rgba(255,255,255,.07), transparent 70%),
    linear-gradient(160deg,#3A2A1C 0%, #2A1D12 55%, #1F150C 100%);
  border:1px solid rgba(201,162,39,.25);box-shadow:var(--shadow), inset 0 0 80px rgba(0,0,0,.5);
}
.desk::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(95deg,rgba(255,255,255,.018) 0 3px,transparent 3px 14px);pointer-events:none}
.deskgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-top:18px;position:relative}
.deskitem{
  border-radius:14px;padding:16px 14px;cursor:pointer;border:none;text-align:left;font-family:var(--sans);
  transition:transform .18s, box-shadow .2s;position:relative;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 10px 24px rgba(0,0,0,.4);
}
.deskitem:hover{transform:translateY(-5px) rotate(-.4deg);box-shadow:0 18px 34px rgba(0,0,0,.55)}
.deskitem .di-ic{font-size:26px}
.deskitem .di-t{font-weight:900;font-size:14px;margin-top:8px}
.deskitem .di-s{font-size:11px;opacity:.75;margin-top:2px}
.di-board{background:linear-gradient(160deg,#2E7D52,#1E5B3A);color:#F1FFF6;border:1px solid rgba(255,255,255,.2)}
.di-note{background:linear-gradient(160deg,#F8F5EE,#E9E2D0);color:var(--ink)}
.di-news{background:linear-gradient(160deg,#ECEBE6,#D9D7CE);color:#222;font-family:var(--serif)}
.di-sched{background:linear-gradient(160deg,#22365C,#16263F);color:#EAF0FA;border:1px solid var(--glassb)}
.di-trophy{background:linear-gradient(160deg,#191919,#0E0E0E);color:var(--gold2);border:1px solid rgba(201,162,39,.4)}
.di-coffee{background:radial-gradient(circle at 30% 25%, #6F4A2D, #3D2716);color:#F4E8DA;animation:pulseGold 2.6s infinite}
.di-coach{background:linear-gradient(160deg,#4A3B6B,#2C2344);color:#EFE9FF}
.di-memo{background:linear-gradient(160deg,#FFF3A8,#F4DE6C);color:#4A3B00;transform:rotate(1.3deg)}
.di-memo:hover{transform:rotate(0) translateY(-5px)}

/* ----- 전광판/경기 ----- */
.scorebar{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 10px;border-radius:16px;
  background:linear-gradient(160deg,#0A1426,#101F3A);border:1px solid var(--glassb);margin-bottom:14px;flex-wrap:wrap}
.scorebar .team{font-weight:900;font-size:15px;display:flex;align-items:center;gap:7px}
.scorebar .score{font-family:var(--serif);font-weight:900;font-size:34px;color:var(--gold2);min-width:86px;text-align:center;letter-spacing:.1em}
.scorebar .clock{font-size:12px;color:#8FA2C4;width:100%;text-align:center;letter-spacing:.25em;font-weight:700}
.pitch{
  border-radius:16px;padding:18px;margin-bottom:14px;position:relative;
  background:repeating-linear-gradient(0deg,#2E7D52 0 26px,#28704A 26px 52px);
  border:1px solid rgba(255,255,255,.25); box-shadow:inset 0 0 60px rgba(0,0,0,.3);
}
.pitch::before{content:"";position:absolute;inset:12px;border:2px solid var(--greenline);border-radius:8px;pointer-events:none}
.pitch::after{content:"";position:absolute;left:12px;right:12px;top:50%;height:2px;background:var(--greenline)}
.pitch .ptxt{position:relative;z-index:2;color:#F1FFF6;font-weight:700;line-height:1.7;font-size:15px;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.ticker{font-size:12.5px;color:#9FB2D2;line-height:1.9;max-height:150px;overflow-y:auto;padding-right:6px}
.ticker b{color:var(--gold2)}
.ticker .goal{color:#FFE08A;font-weight:900}

/* ----- 해설 박스 ----- */
.commbox{display:flex;gap:12px;align-items:flex-start;background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.35);
  border-left:4px solid var(--gold);border-radius:12px;padding:13px 15px;margin-top:14px;animation:pop .35s both}
.commbox .avatar{flex:0 0 auto;width:38px;height:38px;border-radius:50%;background:var(--gold);display:grid;place-items:center;font-size:19px}
.commbox .who{font-size:11px;font-weight:900;color:var(--gold2);letter-spacing:.15em;margin-bottom:3px}
.commbox p{font-size:13.5px;line-height:1.7;color:#EFE3BC}
.rulecard-pop{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:var(--gold);color:var(--navy);
  font-size:11px;font-weight:900;padding:4px 10px;border-radius:99px}

/* ----- 종이 문서(수첩/신문/보고서) ----- */
.paperdoc{background:var(--paper);color:var(--ink);border-radius:14px;padding:24px;box-shadow:var(--shadow);position:relative}
.paperdoc::before{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 27px,rgba(27,42,68,.05) 27px 28px)}
.paperdoc h3{font-family:var(--serif);font-weight:900;font-size:20px;margin-bottom:6px}
.paperdoc .sub{font-size:12px;color:#7A6F58;letter-spacing:.1em;margin-bottom:12px}
.paperdoc p{font-size:14px;line-height:1.8}
.newshead{font-family:var(--serif);font-weight:900;font-size:clamp(20px,4.6vw,30px);line-height:1.25;border-bottom:3px double #333;padding-bottom:10px;margin-bottom:10px}
.rule-entry{border:1px solid #D8CFB8;border-radius:12px;padding:14px;margin-bottom:10px;background:#FFFDF7}
.rule-entry h4{font-weight:900;font-size:15px;display:flex;gap:8px;align-items:center}
.rule-entry p{font-size:13px;color:#4A4231;margin-top:6px;line-height:1.7}
.locked{opacity:.45;filter:grayscale(1)}

/* ----- 선수 카드 ----- */
.squadgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px}
.pcard{background:rgba(255,255,255,.06);border:1px solid var(--glassb);border-radius:13px;padding:12px;cursor:pointer;transition:.18s;text-align:left;color:#EAF0FA;font-family:var(--sans)}
.pcard:hover{border-color:var(--gold)}
.pcard.sel{border-color:var(--gold);background:rgba(201,162,39,.16);box-shadow:0 0 0 1px var(--gold)}
.pcard .pos{font-size:10px;font-weight:900;letter-spacing:.2em;color:var(--gold2)}
.pcard .nm{font-weight:900;font-size:15px;margin:3px 0}
.pcard .tr{font-size:11px;color:#9FB2D2}
.pcard .ovr{float:right;font-family:var(--serif);font-weight:900;font-size:19px;color:var(--gold2)}

/* ----- 능력치 바 ----- */
.statrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.statrow .lb{flex:0 0 92px;font-size:13px;font-weight:700}
.statrow .bar{flex:1;height:9px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
.statrow .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--goldd),var(--gold2));border-radius:99px;transition:width .5s}
.statrow .vl{flex:0 0 28px;text-align:right;font-weight:900;color:var(--gold2);font-size:13px}
.plusbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--gold);background:transparent;color:var(--gold2);font-weight:900;cursor:pointer;font-size:16px}
.plusbtn:hover{background:var(--gold);color:var(--navy)}

/* ----- 트로피/수집 ----- */
.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:14px}
.shelfitem{background:linear-gradient(160deg,#191919,#0D0D0D);border:1px solid rgba(201,162,39,.35);border-radius:13px;padding:16px 10px;text-align:center}
.shelfitem .ic{font-size:30px}
.shelfitem .t{font-size:12px;font-weight:900;color:var(--gold2);margin-top:8px}
.shelfitem .d{font-size:10.5px;color:#8B8B8B;margin-top:3px;line-height:1.5}

/* ----- 결과 배너 ----- */
.bigresult{font-family:var(--serif);font-weight:900;font-size:clamp(36px,9vw,68px);text-align:center;
  background:linear-gradient(110deg,var(--gold2) 30%,#FFF7DD 50%,var(--gold) 70%);background-size:600px 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 2.4s linear infinite;margin:8px 0}
.tag{display:inline-block;background:rgba(255,255,255,.08);border:1px solid var(--glassb);border-radius:99px;padding:4px 12px;font-size:11.5px;font-weight:700;color:#C5D2E8;margin:3px 3px 0 0}
.tag.gold{border-color:var(--gold);color:var(--gold2)}

.modal-back{position:fixed;inset:0;background:rgba(5,10,20,.7);backdrop-filter:blur(4px);display:grid;place-items:center;padding:16px;z-index:50;animation:fadeUp .25s both}
.modal{max-width:680px;width:100%;max-height:86vh;overflow-y:auto}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}
.hint{font-size:11.5px;color:#7E91B4;margin-top:10px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--gold);color:var(--navy);
  font-weight:900;font-size:13px;padding:10px 18px;border-radius:99px;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:pop .3s both}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:99px}
button:focus-visible,.choice:focus-visible{outline:2px solid var(--gold2);outline-offset:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* =========================================================
   라스트 휘슬 (Last Whistle) — 인터랙티브 감독 시뮬레이터
   가상의 대회 "글로벌 챔피언십" / 모든 선수는 가상 인물
========================================================= */

/* ---------- 유틸 ---------- */
const $=s=>document.querySelector(s);
const APP=()=>$("#app");
const rnd=n=>Math.floor(Math.random()*n);
const pick=a=>a[rnd(a.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

/* ---------- 저장(브라우저에서 열면 영구 저장, 미리보기에선 세션 유지) ---------- */
const MEM={};
const store={
  set(k,v){try{localStorage.setItem(k,v);}catch(e){MEM[k]=v;}},
  get(k){try{return localStorage.getItem(k);}catch(e){return MEM[k]??null;}},
  del(k){try{localStorage.removeItem(k);}catch(e){delete MEM[k];}}
};
const SAVE_KEY="coach_choice_v1";

/* ---------- 사운드 (Web Audio 합성음) ---------- */
let AC=null;
function beep(freq,dur,type="sine",vol=.15,when=0){
  if(!G.set.sound)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    o.connect(g);g.connect(AC.destination);
    const t=AC.currentTime+when;o.start(t);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.stop(t+dur);
  }catch(e){}
}
const snd={
  click(){beep(660,.06,"triangle",.08);},
  whistle(){beep(2200,.22,"square",.07);beep(2400,.3,"square",.06,.18);},
  goal(){[523,659,784,1046].forEach((f,i)=>beep(f,.25,"triangle",.14,i*.09));},
  bad(){beep(220,.3,"sawtooth",.09);beep(180,.35,"sawtooth",.08,.12);},
  ding(){beep(1318,.4,"sine",.12);}
};
</script>
<script>
"use strict";
/* =========================================================
   데이터: 규칙 도감 / 선수단 / 대진 / 이벤트 풀
========================================================= */

/* ---------- 규칙 도감 (해설 3종: b=초보, p=전문, c=전직감독) ---------- */
const RULES={
offside:{ic:"🚩",nm:"오프사이드",
 b:"패스하는 순간, 공격수가 상대 수비수 중 뒤에서 두 번째 선수보다 골문에 더 가까이 있으면 반칙이에요. 쉽게 말해 '몰래 앞에 가서 기다리기 금지'랍니다!",
 p:"패스가 발을 떠나는 순간을 기준으로, 공격수의 신체(손·팔 제외)가 최후방 두 번째 수비수보다 골라인에 가까우면 오프사이드 포지션입니다. 그 위치에서 플레이에 관여해야 반칙이 성립합니다.",
 c:"내가 감독할 때 제일 무서운 게 이거였어요. 라인 하나 잘못 맞추면 골이 취소되거든. 핵심은 '패스 순간'의 위치라는 것, 그리고 위치만으로는 반칙이 아니고 플레이에 관여해야 한다는 것."},
handball:{ic:"🖐️",nm:"핸드볼 반칙",
 b:"손이나 팔로 공을 건드리면 반칙이에요. 단, 일부러가 아니고 팔이 몸에 자연스럽게 붙어 있었다면 봐주기도 해요. 골키퍼는 자기 페널티 박스 안에서만 손을 쓸 수 있어요.",
 p:"팔이 부자연스럽게 몸을 크게 만든 상태에서 공에 닿으면 반칙입니다. 페널티 지역 안에서 수비수가 범하면 페널티킥, 밖이면 직접 프리킥이 주어집니다.",
 c:"수비수들에게 늘 말했죠. '박스 안에선 팔을 등 뒤로!' 요즘 규정은 팔의 위치가 '자연스러운가'를 봅니다. 점프할 때 팔을 벌리는 습관, 그게 PK를 부르는 겁니다."},
var:{ic:"📺",nm:"VAR (비디오 판독)",
 b:"심판이 못 본 장면을 비디오로 다시 확인하는 제도예요. 골, 페널티킥, 레드카드, 사람을 잘못 본 경우 — 이 네 가지 큰 상황에서만 쓸 수 있어요.",

 C("\"위치만으론 반칙이 아니다!\" 그대로 진행",{atk:1,xp:2},"규칙을 정확히 아는 팀의 침착한 공격."),
 C("혼란을 피해 일단 후방으로 돌린다",{def:1},"안전하게 다시 만들어 간다.")]});
EV.push({id:"m78",ph:["h2"],rule:"pk",txt:"PK 재킥 논란! 골키퍼가 너무 일찍 라인을 떠났는지 VAR이 확인 중이다.",ch:[
 C("규정(킥 순간 한 발 라인 위)을 떠올리며 대기",{xp:3},"판독 결과 키퍼 위반 — 우리에게 재킥! 이번엔 성공!",{goal:1}),
 C("결과를 기다린다",{xp:1},"재킥 판정! 두 번째 기회를 살렸다.",{goal:1})]});
EV.push({id:"m79",ph:["h1"],rule:"throwin",txt:"우리 스로인. 던질 곳이 마땅치 않자 백한결 골키퍼에게 던지려 한다!",ch:[

EV.push({id:"m80",ph:["h1","h2"],rule:"advantage",txt:"상대 반칙! 그런데 공이 우리 공격수 앞에 뚝 떨어졌다. 주심이 어드밴티지 제스처!",ch:[
 C("\"슛!!!\"",{atk:2,xp:1},"논스톱 슈팅! 골키퍼 슈퍼세이브에 막혔지만 박수가 쏟아진다."),
 C("더 좋은 각도의 동료에게 연결 지시",{atk:2,xp:2},"이타적인 패스가 더 큰 찬스를 만들었다!")]});

<script>
"use strict";
/* =========================================================
   게임 상태 & 엔진
========================================================= */
let G=null;
function newGame(){
 G={ name:"감독",
  set:{sound:true,comm:"b"},
  coach:{xp:0,pts:0,stats:{tac:1,man:1,med:1,fit:1,psy:1}},
  team:{sel:[],cap:null,tactic:null,train:null,morale:62,stamina:82},
  fix:0, grp:{pts:0,res:[]},
  flags:{unbeaten:true,pkWins:0,varCount:0,reds:0,lateGoals:0,rookie:false,goals:0,conceded:0,wins:0,cleanSheets:0,press:50,styleAtk:0,styleDef:0,fairplay:true,etPlayed:0,comebacks:0},
  notebook:[],cards:[],articles:[],trophies:[],achv:[],usedPre:[],
  screen:"title", match:null
 };
}
function save(){try{store.set(SAVE_KEY,JSON.stringify(G));}catch(e){}}
function hasSave(){return !!store.get(SAVE_KEY);}
function loadSave(){try{G=JSON.parse(store.get(SAVE_KEY));return true;}catch(e){return false;}}

const STATNM={tac:"전술 감각",man:"선수 관리",med:"언론 대응",fit:"체력 관리",psy:"심리전"};
const COMMNM={b:["🧢","박초보 해설위원","처음 보는 사람도 이해되는 친절 해설"],p:["🎙️","김전문 해설위원","규정집을 통째로 외운 정밀 해설"],c:["🏆","레전드 차감독","우승 경험에서 나오는 현장 해설"]};

function unlockRule(key){
 if(!RULES[key]||G.notebook.includes(key))return false;
 G.notebook.push(key);G.cards.push(key);
 if(G.notebook.length===5)addAchv("규칙 입문자","규칙 도감 5개 등록");
 if(G.notebook.length===12)addAchv("걸어다니는 규정집","규칙 도감 12개 등록");
 if(G.notebook.length>=Object.keys(RULES).length)addAchv("규칙 마스터","규칙 도감 완성!");
 return true;
}
function addAchv(nm,d){if(G.achv.find(a=>a.nm===nm))return;G.achv.push({nm,d});toast("🏅 업적 달성: "+nm);snd.ding();}
function addTrophy(nm,d,ic){if(G.trophies.find(t=>t.nm===nm))return;G.trophies.push({nm,d,ic:ic||"🏆"});toast("🏆 트로피 획득: "+nm);snd.ding();}
function addArticle(h,d){G.articles.push({h,d});}

function teamRating(){
 const sel=SQUAD.filter(p=>G.team.sel.includes(p.id));
 const avg=sel.length?sel.reduce((s,p)=>s+p.ovr,0)/sel.length:78;
 return avg + G.coach.stats.tac*0.7 + (G.team.morale-60)*0.06 + (G.team.stamina-70)*0.05;
}

/* ---------- 화면 렌더 공통 ---------- */
function render(html,cls){
 APP().innerHTML=`<div class="topbar">
   <div class="brand">라스트 휘슬<small>Last Whistle</small></div>
   <div class="statchips">${G&&G.screen!=="title"&&G.screen!=="setup"?`
     <span class="chip">😊 사기 <b>${G.team.morale}</b></span>
     <span class="chip">⚡ 체력 <b>${G.team.stamina}</b></span>
     <span class="chip">📰 언론 <b>${G.flags.press}</b></span>
     <span class="chip">✨ XP <b>${G.coach.xp}</b></span>`:""}
     <button class="iconbtn" onclick="openSettings()" aria-label="설정">⚙️</button>
   </div></div>
   <div class="fade ${cls||""}">${html}</div>`;
 window.scrollTo({top:0,behavior:"smooth"});
}
function choicesHtml(list,fn){
 return `<div class="choices">`+list.map((c,i)=>`
  <button class="choice" onclick="${fn}(${i})"><span class="key">${i+1}</span><span>${esc(c.t)}${c.d?`<small>${esc(c.d)}</small>`:""}</span></button>`).join("")+`</div>`;
}
document.addEventListener("keydown",e=>{
 if(e.key>="1"&&e.key<="4"){const b=document.querySelectorAll(".choice")[+e.key-1];if(b)b.click();}
});

/* ---------- 설정 모달 ---------- */
function openSettings(){
 const m=document.createElement("div");m.className="modal-back";m.id="setmodal";
 m.innerHTML=`<div class="glass panel modal">
  <div class="eyebrow">Settings</div><h2 class="scene">설정</h2>
  <p class="lead" style="margin-bottom:8px">해설 스타일</p>
  <div class="choices">${Object.entries(COMMNM).map(([k,v])=>`
    <button class="choice" style="${G.set.comm===k?'border-color:var(--gold);background:rgba(201,162,39,.15)':''}" onclick="G.set.comm='${k}';save();openSettings2()">
    <span class="key">${v[0]}</span><span>${v[1]}<small>${v[2]}</small></span></button>`).join("")}
  </div>
  <div class="goldline"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
   <button class="btn ghost" onclick="G.set.sound=!G.set.sound;save();openSettings2()">${G.set.sound?"🔊 사운드 켜짐":"🔇 사운드 꺼짐"}</button>
   <button class="btn ghost" onclick="if(confirm('처음부터 다시 시작할까요? 저장이 삭제됩니다.')){store.del(SAVE_KEY);newGame();closeSettings();scTitle();}">🗑️ 새 게임</button>
   <button class="btn" onclick="closeSettings()">닫기</button>
  </div>
  <p class="hint">저장은 자동으로 됩니다. 브라우저에서 파일을 직접 열면 이어하기가 유지돼요.</p>
 </div>`;
 m.addEventListener("click",e=>{if(e.target===m)closeSettings();});
 document.body.appendChild(m);
}
function openSettings2(){closeSettings();openSettings();}
function closeSettings(){const m=$("#setmodal");if(m)m.remove();}

/* =========================================================
   화면: 타이틀 / 설정 / 스쿼드 / 주장 / 훈련 / 전술
========================================================= */
function scTitle(){
 G.screen="title";
 render(`<div class="glass panel" style="text-align:center;padding:48px 22px">
  <div class="eyebrow">Interactive Manager Story</div>
  <h1 class="display">라스트 휘슬</h1>
  <p class="lead" style="max-width:560px;margin:14px auto 0">가상의 국제 대회 <b style="color:var(--gold2)">글로벌 챔피언십</b>.<br>
  당신은 대한민국 대표팀의 새 감독입니다.<br>모든 선택이 팀의 운명을, 그리고 당신의 전설을 만듭니다.</p>
  <div class="goldline" style="margin:24px auto;max-width:200px;background:linear-gradient(90deg,transparent,var(--gold),transparent)"></div>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
   <button class="btn" onclick="snd.click();scSetup()">🆕 새로운 도전</button>
   ${hasSave()?`<button class="btn ghost" onclick="snd.click();if(loadSave()){toast('이어하기 불러오기 완료');resume();}">▶️ 이어하기</button>`:""}
  </div>
  <p class="hint">⚽ 이 게임의 대회·선수·팀은 모두 가상입니다 · 키보드 1~4로 선택 가능</p>
 </div>`);
}
function resume(){
 const s=G.screen;
 if(G.match){startPhase();return;}
 if(s==="desk"||s==="report")scDesk();
 else if(["squad","captain","training","tactic"].includes(s))scSquad();
 else scTitle();
}
function scSetup(){
 newGame();G.screen="setup";
 render(`<div class="glass panel">
  <div class="eyebrow">Episode 0 · 부임</div>
  <h2 class="scene">대한축구협회, 새 감독을 발표하다</h2>
  <p class="lead">기자들의 플래시가 터집니다. 협회장이 당신에게 마이크를 넘깁니다.<br>"글로벌 챔피언십 우승. 그것이 우리가 당신을 모신 이유입니다."</p>
  <div class="goldline"></div>
  <p class="lead" style="margin-bottom:6px">감독님의 성함은?</p>
  <input id="nmInput" maxlength="10" placeholder="예: 김감독" style="width:100%;max-width:300px;padding:12px 14px;border-radius:12px;border:1px solid var(--glassb);background:rgba(255,255,255,.07);color:#fff;font-size:15px;font-family:var(--sans)">
  <p class="lead" style="margin:18px 0 6px">중계석의 파트너, 해설위원을 선택하세요. <small style="color:#7E91B4">(언제든 설정에서 변경 가능)</small></p>
  ${choicesHtml(Object.entries(COMMNM).map(([k,v])=>({t:v[0]+" "+v[1],d:v[2],k})),"pickComm")}
 </div>`);
}
function pickComm(i){
 G.set.comm=Object.keys(COMMNM)[i];
 const nm=$("#nmInput").value.trim();G.name=nm||"김감독";
 snd.click();save();scSquad();
}
/* ---------- 스쿼드 선발 ---------- */
const NEED={GK:1,DF:4,MF:4,FW:2};
let selTmp=[];
function scSquad(){
 G.screen="squad";selTmp=[...G.team.sel];
 const cnt=pos=>selTmp.filter(id=>SQUAD.find(p=>p.id===id).pos===pos).length;
 render(`<div class="glass panel">
  <div class="eyebrow">대회 준비 1/4 · 대표팀 선발</div>
  <h2 class="scene">베스트 11의 뼈대를 세워라</h2>
  <p class="lead">포지션별로 핵심 선발 자원을 선택하세요. <b style="color:var(--gold2)">GK ${cnt("GK")}/1 · DF ${cnt("DF")}/4 · MF ${cnt("MF")}/4 · FW ${cnt("FW")}/2</b></p>
  <div class="squadgrid">${SQUAD.map(p=>`
   <button class="pcard ${selTmp.includes(p.id)?"sel":""}" onclick="togglePick('${p.id}')">
    <span class="ovr">${p.ovr}</span><div class="pos">${p.pos}</div><div class="nm">${p.nm}</div><div class="tr">${p.tr}</div>
   </button>`).join("")}</div>
  <div style="margin-top:18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
   <button class="btn" id="sqDone" onclick="confirmSquad()">명단 확정 →</button>
   <span class="hint" style="margin:0">선택하지 않은 선수들도 교체 자원으로 함께합니다.</span>
  </div></div>`);
 updateSqBtn();
}
function togglePick(id){
 const p=SQUAD.find(x=>x.id===id);
 if(selTmp.includes(id)){selTmp=selTmp.filter(x=>x!==id);}
 else{
  const c=selTmp.filter(x=>SQUAD.find(q=>q.id===x).pos===p.pos).length;
  if(c>=NEED[p.pos]){toast(p.pos+" 포지션은 "+NEED[p.pos]+"명까지!");return;}
  selTmp.push(id);
 }
 snd.click();G.team.sel=selTmp;scSquad();
}
function updateSqBtn(){
 const ok=Object.entries(NEED).every(([pos,n])=>selTmp.filter(id=>SQUAD.find(p=>p.id===id).pos===pos).length===n);
 $("#sqDone").disabled=!ok;
}
function confirmSquad(){G.team.sel=selTmp;save();snd.click();scCaptain();}

function scCaptain(){
 G.screen="captain";
 const cands=CAPTAINS.map(id=>SQUAD.find(p=>p.id===id));
 render(`<div class="glass panel">
  <div class="eyebrow">대회 준비 2/4 · 주장 선임</div>
  <h2 class="scene">완장을 찰 사나이</h2>
  <p class="lead">주장은 그라운드 위의 또 다른 감독입니다. 누구에게 완장을 맡기시겠습니까?</p>
  ${choicesHtml(cands.map(p=>({t:`${p.nm} (${p.pos}·${p.ovr})`,d:p.tr})),"pickCap")}
 </div>`);
}
function pickCap(i){
 G.team.cap=CAPTAINS[i];G.team.morale+=4;snd.click();
 addAchv("첫 임명장","주장을 선임했다");save();scTraining();
}
function scTraining(){
 G.screen="training";
 render(`<div class="glass panel">
  <div class="eyebrow">대회 준비 3/4 · 훈련 방향</div>
  <h2 class="scene">소집 훈련, 무엇에 집중할까</h2>
  <p class="lead">대회 기간 전체에 영향을 주는 팀의 '색깔'을 정합니다.</p>
  ${choicesHtml(TRAININGS.map(t=>({t:t.nm,d:t.d})),"pickTrain")}
 </div>`);
}
function pickTrain(i){G.team.train=TRAININGS[i].id;snd.click();save();scTactic(true);}
function scTactic(first){
 G.screen="tactic";
 render(`<div class="glass panel">
  <div class="eyebrow">${first?"대회 준비 4/4 · ":""}전술 보드</div>
  <h2 class="scene">팀의 기본 전술</h2>
  <p class="lead">초록 보드 위에 자석을 옮기며 고민합니다. 우리 팀의 정체성은…</p>
  ${choicesHtml(TACTICS.map(t=>({t:t.nm,d:t.d})),"pickTac")}
 </div>`);
}
function pickTac(i){
 G.team.tactic=TACTICS[i].id;snd.click();
 if(TACTICS[i].atk>=3)G.flags.styleAtk++;if(TACTICS[i].def>=3)G.flags.styleDef++;
 save();
 if(G.screen==="tactic"&&G.fix===0&&G.grp.res.length===0&&!G.match){scDeskIntro();}else{scDesk();}
}
function scDeskIntro(){
 render(`<div class="glass panel">
  <div class="eyebrow">감독실</div>
  <h2 class="scene">당신의 책상</h2>
  <p class="lead">협회가 마련해 준 감독 사무실. 가죽 책상 위에 전술 보드와 수첩, 김이 나는 커피가 놓여 있습니다.<br>
  이곳에서 모든 것을 지휘하게 됩니다. <b style="color:var(--gold2)">☕ 커피를 마시면 다음 일정이 진행</b>됩니다.</p>
  <div style="margin-top:16px"><button class="btn" onclick="snd.click();scDesk()">책상에 앉는다 →</button></div>
 </div>`);
}
</script>
<script>
"use strict";
/* =========================================================
   감독의 책상 (허브) & 문서 화면들
========================================================= */
function scDesk(){
 G.screen="desk";save();
 const fx=FIXTURES[G.fix];
 const done=!fx;
 render(`<div class="desk">
  <div class="eyebrow" style="color:var(--gold2)">감독실 · ${G.name} 감독</div>
  <h2 class="scene" style="margin-bottom:2px">감독의 책상</h2>
  <p class="lead" style="color:#D9C7AE">${done?"대회가 끝났습니다. 책상 위가 고요합니다.":`다음 일정: <b style="color:var(--gold2)">${fx.st} vs ${fx.fl} ${fx.opp}</b>`}</p>
  <div class="deskgrid">
   ${done?"":`<button class="deskitem di-coffee" onclick="snd.click();startPrep()"><span class="di-ic">☕</span><div><div class="di-t">커피 한 모금</div><div class="di-s">다음 일정 진행</div></div></button>`}

function chooseEv(i){
 const e=curEv,c=e.ch[i];snd.click();
 applyFx(c.fx);
 let extra="";
 if(c.sub){
  if(c.sub.goal){addGoal(true);extra+=`<p class="ptxt" style="color:#FFE08A;font-size:18px">⚽ GOOOOAL! 대한민국 득점!</p>`;snd.goal();}
  if(c.sub.oppGoal){addGoal(false);extra+=`<p class="ptxt" style="color:#FF9A8A">😨 실점… 전광판이 바뀐다.</p>`;snd.bad();}
  if(c.sub.useSub)useSubCard();
 }
 if(c.fx.useSub)useSubCard();
 if(c.fx.flag==="rookie")G.flags.rookie=true;
 if(c.fx.flag==="pkready")G.flags.pkready=true;
 let riskTxt="";
 if(c.fx.redRisk&&Math.random()<.30){G.flags.reds++;G.flags.fairplay=false;if(G.match)G.match.def-=3;riskTxt=`<p class="ptxt" style="color:#FF9A8A">🟥 아…! 결국 두 번째 경고로 퇴장! 10명 싸움이 됐다.</p>`;snd.bad();unlockRule("red");}
 else if(c.fx.cardRisk&&Math.random()<.35){G.flags.fairplay=false;riskTxt=`<p class="ptxt" style="color:#FFD08A">🟨 벤치에 경고가 주어졌다.</p>`;unlockRule("yellow");}
 if(c.fx.injRisk&&Math.random()<.30){G.team.stamina=clamp(G.team.stamina-5,0,100);riskTxt+=`<p class="ptxt" style="color:#FF9A8A">🩹 우려가 현실로 — 결국 통증이 재발했다.</p>`;}
 if(c.fx.risk&&Math.random()<.18&&G.match){addGoal(false);riskTxt+=`<p class="ptxt" style="color:#FF9A8A">💥 탈압박 실수가 실점으로! 도전엔 대가가 따른다.</p>`;snd.bad();}
 const newRule=e.rule?unlockRule(e.rule):false;
 if(e.rule==="var"||e.rule==="goalline")G.flags.varCount++;
 if(G.match&&e.rule&&!G.match.rules.includes(e.rule))G.match.rules.push(e.rule);
 const r=e.rule?RULES[e.rule]:null;
 render(`${G.match?scorebarHtml():""}<div class="glass panel">

  ${r?`<div class="commbox"><div class="avatar">${COMMNM[G.set.comm][0]}</div><div>
    <div class="who">${COMMNM[G.set.comm][1]} · ${r.ic} ${r.nm}</div>
    <p>${r[G.set.comm]}</p>
    ${newRule?`<span class="rulecard-pop">📓 감독 수첩에 기록됨 · 규칙 카드 획득!</span>`:""}
   </div></div>`:""}
  <div style="margin-top:18px"><button class="btn" onclick="snd.click();${afterEv}()">계속 →</button></div>
 </div>`);
 save();
}
function applyFx(fx){
 if(!fx)return;
 const man=G.coach.stats.man;
 if(fx.mo)G.team.morale=clamp(G.team.morale+fx.mo+(fx.mo<0?Math.min(2,Math.floor(man/4)):0),0,100);
 if(fx.sta)G.team.stamina=clamp(G.team.stamina+fx.sta,0,100);
 if(fx.xp)G.coach.xp+=fx.xp;
 if(fx.press)G.flags.press=clamp(G.flags.press+fx.press+(fx.press<0?Math.min(2,Math.floor(G.coach.stats.med/4)):0),0,100);
 if(G.match){if(fx.atk)G.match.atk+=fx.atk;if(fx.def)G.match.def+=fx.def;}
 if(fx.atk>0)G.flags.styleAtk+=fx.atk>=2?1:0;
 if(fx.def>0)G.flags.styleDef+=fx.def>=2?1:0;
}
function useSubCard(){if(G.match&&G.match.subs>0)G.match.subs--;}
function addGoal(us){
 if(!G.match)return;
 if(us){G.match.us++;G.flags.goals++;if(G.match.phase>=5)G.flags.lateGoals++;if(G.flags.rookie&&Math.random()<.4)G.flags.rookieGoal=true;}
 else{G.match.them++;G.flags.conceded++;}
 if(G.match.them>G.match.us)G.match.wasBehind=true;
}

<script>

function startMatch(){

 G.match={st:f.st,opp:f.opp,fl:f.fl,pw:f.pw,ko:f.ko,us:0,them:0,
  atk:tac.atk+(tr==="press"?1:0)+(tr==="setpiece"?1:0),
  def:tac.def+(tr==="press"?1:0),
  subs:5,phase:0,used:[],log:[],rules:[],wasBehind:false,et:false};
 if(tr==="fitness")G.team.stamina=clamp(G.team.stamina+4,0,100);

 save();snd.whistle();
 render(`${scorebarHtml()}<div class="glass panel">

 render(`${scorebarHtml()}<div class="glass panel">

}

 render(`<div class="glass panel">
  <div class="eyebrow">기자회견 · 반응</div>
  <div class="pitch"><p class="ptxt">${esc(c.re)}</p></div>
  <div style="margin-top:14px"><button class="btn" onclick="snd.click();nextStep()">다음 →</button></div>
 </div>`);
 save();
}
/* ---------- 다음 단계 분기 ---------- */
function nextStep(){
 const m=G.match;
 const isFinal=m.st==="결승";
 const won=m.res==="W";
 G.match=null;
 /* 조별리그 종료 판정 */
 if(G.fix===2&&G.grp.res.length>=3){
  if(G.grp.pts>=5){addTrophy("조별리그 통과","16강 진출 확정","🎫");G.fix=3;save();qualifyScene(true);return;}
  if(G.grp.pts===4){
   const lucky=Math.random()<0.5;
   if(lucky){addTrophy("조별리그 통과","극적인 16강 진출","🎫");G.fix=3;save();qualifyScene(true,true);return;}
   save();scEnding();return;
  }
  save();scEnding();return;
 }
 if(m.ko){ if(!won){save();scEnding();return;} if(isFinal){save();scEnding();return;} }
 G.fix++;save();
 render(`<div class="glass panel">
  <div class="eyebrow">대회 일정</div>
  <h2 class="scene">${won?"다음 라운드가 기다린다":"다음 경기를 준비하라"}</h2>
  <p class="lead">버스가 호텔로 돌아갑니다. 창밖으로 응원 깃발이 흔들립니다.<br>다음 상대: <b style="color:var(--gold2)">${FIXTURES[G.fix].fl} ${FIXTURES[G.fix].opp}</b> (${FIXTURES[G.fix].st})</p>
  <div style="margin-top:14px"><button class="btn" onclick="snd.click();scDesk()">감독실로 →</button></div>
 </div>`);
}
function qualifyScene(ok,lucky){
 render(`<div class="glass panel" style="text-align:center">
  <div class="eyebrow">조별리그 최종 결과</div>
  <div class="bigresult" style="color:#FFE08A">16강 진출!</div>
  <p class="lead">${lucky?"다른 경기 결과가 우리를 도왔습니다. 축구의 신은 가끔 미소를 짓습니다.":"승점 "+G.grp.pts+"점. 당당한 토너먼트 진출입니다."}<br>다음 상대: <b style="color:var(--gold2)">🇯🇵 일본 (16강)</b></p>
  <div style="margin-top:14px"><button class="btn" onclick="snd.click();scDesk()">감독실로 →</button></div>
 </div>`);snd.ding();
}
/* =========================================================
   엔딩 시스템 (20+)
========================================================= */
function reachedStage(){
 /* 어디까지 갔는가 */
 if(G.grp.res.length>=3&&G.fix<=2)return "group";
 if(G.fix===3)return "r16";
 if(G.fix===4)return "qf";
 if(G.fix===5)return "sf";
 if(G.fix===6)return "final";
 return "group";
}
function buildEndings(champ,stage){
 const f=G.flags,s=G.coach.stats;
 const E=[];
 const add=(cond,ic,nm,d)=>{if(cond)E.push({ic,nm,d});};
 add(champ&&f.unbeaten&&G.team.morale>=75,"👑","전설의 감독","무패 우승, 그리고 선수들의 마음까지 얻었다. 100년 뒤에도 회자될 이름.");
 add(champ&&f.unbeaten,"🛡️","무패 우승","단 한 번도 무릎 꿇지 않고 정상에 섰다.");
 add(champ&&s.tac>=8,"🧠","전술 천재","상대 감독들이 당신의 화이트보드를 두려워한다.");
 add(champ&&f.fairplay,"🤍","페어플레이의 사도","카드 한 장 없이 우승컵을 들었다. 축구가 아름다운 이유.");
 add(f.pkWins>=2,"🥅","승부차기의 황제","11미터 앞에서 당신의 팀은 떨지 않는다.");
 add(f.varCount>=4,"📺","VAR 마스터","비디오 판독의 순간마다 침착했던 감독.");
 add(f.lateGoals>=3,"🎭","극장골 연출가","추가시간, 관중들은 자리를 뜨지 못한다.");
 add(f.goals>=14,"🔥","공격 축구의 광인","\"한 골 먹으면 두 골 넣는다\" — 당신의 철학.");
 add(f.cleanSheets>=4,"🧱","수비 축구의 장인","골문 앞에 만리장성을 쌓았다.");
 add(f.rookieGoal,"🌱","신인 조련사","18세 구슬찬의 골 — 한국 축구의 10년을 벌었다.");
 add(f.comebacks>=2,"🔄","역전의 명수","끌려가도 당황하지 않는다. 벤치에 당신이 있으니까.");
 add(f.press>=80,"📰","언론의 친구","기자실에 당신의 팬클럽이 생겼다.");
 add(f.press<=20,"🌶️","언론의 적","헤드라인은 매웠지만, 선수단은 당신 뒤에 섰다.");
 add(G.team.morale>=85,"❤️","선수들의 아버지","계약이 끝나도 선수들은 당신에게 안부를 묻는다.");
 add(G.notebook.length>=Object.keys(RULES).length,"📚","걸어다니는 규정집","규칙 도감 완성. 심판도 당신에게 물어본다.");
 add(f.etPlayed>=2,"⏱️","120분의 사나이","연장전이 두렵지 않은 강철 체력 군단.");
 add(s.psy>=8,"🧊","심리전의 대가","상대는 경기 전부터 이미 지고 있었다.");
 add(f.reds===0&&f.fairplay,"😇","신사 감독","퇴장 없는 대회. 품격이 곧 전술이었다.");
 /* 성적 엔딩 (항상 1개 보장) */
 add(champ,"🏆","우승 감독","글로벌 챔피언십 정상. 공항에 5만 명이 모였다.");
 add(!champ&&stage==="final","🥈","준우승의 한","결승의 패배는 평생 가슴에 남지만, 국민은 박수를 보냈다.");
 add(!champ&&stage==="sf","🌟","4강 신화","세계 4강. 거리는 붉은 물결이었다.");
 add(!champ&&stage==="qf","🏅","8강의 자존심","강호들과 어깨를 나란히 했다.");
 add(!champ&&stage==="r16","🎖️","16강의 추억","토너먼트의 벽은 높았지만 미래를 보았다.");
 add(!champ&&stage==="group","✈️","조별리그 탈락","이른 귀국길. 그러나 노트에는 다음 대회의 답이 적혀 있다.");
 return E;
}
function scEnding(){
 G.screen="ending";endingMode=true;
 const stage=reachedStage();
 const champ=G.trophies.some(t=>t.nm==="글로벌 챔피언십 우승");
 const E=buildEndings(champ,stage);
 const main=E[0]||{ic:"⚽",nm:"여정의 끝",d:"하나의 대회가 끝났다."};
 const others=E.slice(1);
 if(champ)snd.goal();else snd.whistle();
 addArticle(champ?`${G.name} 감독, 대한민국을 세계 정상에 올리다`:`${G.name}호의 도전, ${main.nm}으로 막 내리다`,"대회 결산 특집 · 스포츠연감 보존판");
 save();
 render(`<div class="glass panel" style="text-align:center">
  <div class="eyebrow">THE FINAL WHISTLE · 대회 종료</div>
  <div class="bigresult">${main.ic}</div>
  <h2 class="scene" style="font-size:clamp(26px,6vw,40px)">${main.nm}</h2>
  <p class="lead" style="max-width:560px;margin:0 auto">${main.d}</p>
  <div class="goldline"></div>
  ${others.length?`<p class="lead" style="margin-bottom:6px">🎬 함께 달성한 엔딩 ${others.length}개</p>
  <div style="text-align:left;display:inline-block">${others.map(e=>`<span class="tag gold">${e.ic} ${e.nm}</span>`).join(" ")}</div>`:""}
  <div class="paperdoc" style="margin-top:18px;text-align:left">
   <h3>📋 ${esc(G.name)} 감독 대회 결산</h3><div class="sub">GLOBAL CHAMPIONSHIP · FINAL REPORT</div>
   <p>전적 <b>${G.flags.wins}승</b> · 득점 ${G.flags.goals} · 실점 ${G.flags.conceded} · 클린시트 ${G.flags.cleanSheets}<br>
   승부차기 승리 ${G.flags.pkWins} · 역전승 ${G.flags.comebacks} · 극장골 ${G.flags.lateGoals}<br>
   규칙 도감 ${G.notebook.length}/${Object.keys(RULES).length} · 트로피 ${G.trophies.length} · 업적 ${G.achv.length} · 신문 스크랩 ${G.articles.length}</p>
  </div>
  <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
   <button class="btn ghost" onclick="snd.click();scShelf()">🏆 트로피 진열장 보기</button>
   <button class="btn ghost" onclick="snd.click();scNotebook()">📓 감독 수첩 보기</button>
   <button class="btn" onclick="snd.click();endingMode=false;store.del(SAVE_KEY);newGame();scTitle()">🔁 새로운 도전 (다른 엔딩 노리기)</button>
  </div>
  <p class="hint">엔딩은 20종 이상! 전술·언론·승부차기 플레이에 따라 달라집니다.</p>
 </div>`);
}
/* 엔딩 화면에서 진열장/수첩 본 뒤 돌아올 수 있게 backBtn 보정 */
const _origBack=backBtn;
let endingMode=false;
backBtn=function(){return endingMode?`<button class="btn ghost" onclick="snd.click();scEnding()">← 결산으로</button>`:_origBack();};
/* =========================================================
   초기화
========================================================= */
newGame();
scTitle();
</script>
</body>
</html>
